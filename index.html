<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Attendly - Attendance Hub Pro</title>
    <meta name="description" content="Professional Attendance and Staff Tracking Management System" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root">
      <div id="loading-screen" style="display: flex; height: 100vh; align-items: center; justify-content: center; background: #0f172a; color: white; font-family: sans-serif;">
        <div style="text-align: center; max-width: 80%; overflow-wrap: break-word;">
          <h1 style="font-size: 1.5rem; margin-bottom: 1rem;">Attendly Pro</h1>
          <p id="status-text" style="opacity: 0.6; font-size: 0.875rem;">Initializing system...</p>
          <div id="error-display" style="display: none; margin-top: 1rem; padding: 1rem; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 0.5rem; text-align: left;">
            <p style="color: #ef4444; font-weight: bold; margin-bottom: 0.5rem;">Critical Error Detected:</p>
            <pre id="error-message" style="font-size: 0.75rem; color: #f87171; white-space: pre-wrap;"></pre>
            <button onclick="localStorage.clear(); sessionStorage.clear(); location.reload();" style="margin-top: 1rem; background: #ef4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.25rem; cursor: pointer;">Reset App Data</button>
          </div>
        </div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.getElementById('status-text').innerText = 'System failure during boot.';
        document.getElementById('error-display').style.display = 'block';
        document.getElementById('error-message').innerText = msg + '\nAt: ' + url + ':' + lineNo + ':' + columnNo + (error ? '\n' + error.stack : '');
        return false;
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('status-text').innerText = 'System failure (Promise rejection).';
        document.getElementById('error-display').style.display = 'block';
        document.getElementById('error-message').innerText = 'Unhandled Rejection: ' + (event.reason ? (event.reason.message || event.reason) : 'Unknown reason');
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
