services:
  - type: web
    name: attendly-pro
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_CHAT_SUPABASE_URL
        sync: false
      - key: VITE_CHAT_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_CHAT_STORAGE_BUCKET
        sync: false
      - key: VITE_GOOGLE_CALENDAR_API_KEY
        sync: false
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: FRONTEND_URL
        sync: false
